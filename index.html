<style>
  :root {
    --desk-0: #070709;
    --desk-1: #0c0c10;
    --desk-grain: rgba(255,255,255,0.015);
    --device-steel: #1a1a1e;
    --device-edge: #2a2a30;
    --device-bezel: #050507;
    --screen-bg: #000;
    --ink: #f6f6f8;
    --ink-dim: rgba(246,246,248,0.62);
    --ink-faint: rgba(246,246,248,0.32);
    --accent: oklch(0.78 0.12 170);
    --accent-ink: oklch(0.98 0.02 170);
    --warm: oklch(0.82 0.14 75);
    --rule: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.045);
    --card-hi: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; height:100%; background: var(--desk-0); color: var(--ink); font-family: 'Geist', system-ui, sans-serif; overflow: hidden; }
  body {
    background:
      radial-gradient(80% 60% at 50% 40%, #141419 0%, #0a0a0d 55%, #050507 100%);
  }
  body::before{
    content:""; position: fixed; inset:0; pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.04), transparent 50%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.03), transparent 50%),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.025), transparent 50%);
    background-size: 220px 220px, 180px 180px, 260px 260px;
    mix-blend-mode: screen;
    opacity: 0.7;
  }
  #root { height: 100%; width: 100%; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .tweaks {
    position: fixed; right: 16px; bottom: 16px; z-index: 9999;
    width: 260px; background: rgba(18,18,22,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px;
    color: var(--ink); font-size: 12px; display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .tweaks.open { display: block; }
  .tweaks h4 { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); font-weight: 500; }
  .tweaks .row { margin-bottom: 10px; }
  .tweaks label { display:block; font-size: 11px; color: var(--ink-dim); margin-bottom: 6px; }
  .tweaks .pills { display:flex; gap:6px; flex-wrap: wrap; }
  .tweaks .pill { padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid transparent; cursor: pointer; font-size: 11px; color: var(--ink); }
  .tweaks .pill.active { border-color: var(--accent); color: var(--accent-ink); background: color-mix(in oklch, var(--accent) 20%, transparent); }
  .device, .dock, .statusbar { user-select: none; }
</style>
</head>

// ============ LOCKSCREEN ============
function Wallpaper({ kind }) {
  if (kind === 'grid') {
    return (
      <div style={{position:'absolute', inset:0, background:'#05060a'}}>
        <svg width="100%" height="100%" viewBox="0 0 414 868" preserveAspectRatio="xMidYMid slice"
             style={{position:'absolute', inset:0}}>
          <defs>
            <radialGradient id="wg" cx="50%" cy="30%" r="80%">
              <stop offset="0%" stopColor="#0e1930" stopOpacity="1"/>
              <stop offset="60%" stopColor="#060814" stopOpacity="1"/>
              <stop offset="100%" stopColor="#020205" stopOpacity="1"/>
            </radialGradient>
            <pattern id="wgrid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
              <path d="M36 0H0V36" fill="none" stroke="rgba(120,170,255,0.06)" strokeWidth="0.6"/>
            </pattern>
            <radialGradient id="wglow" cx="50%" cy="35%" r="45%">
              <stop offset="0%" stopColor="rgba(80,150,255,0.22)"/>
              <stop offset="100%" stopColor="rgba(80,150,255,0)"/>
            </radialGradient>
          </defs>
          <rect width="414" height="868" fill="url(#wg)"/>
          <rect width="414" height="868" fill="url(#wgrid)"/>
          <rect width="414" height="868" fill="url(#wglow)"/>
          {Array.from({length: 28}).map((_,i)=>{
            const x = (i*53 + 23) % 400 + 7;
            const y = (i*137 + 51) % 820 + 20;
            return <circle key={i} cx={x} cy={y} r={i%4===0?1.6:1} fill="rgba(140,190,255,0.45)" opacity={0.3+((i%5)*0.12)}/>
          })}
          {Array.from({length: 12}).map((_,i)=>{
            const x1 = (i*71+30)%400+7, y1 = (i*193+60)%820+20;
            const x2 = (i*113+55)%400+7, y2 = (i*227+120)%820+20;
            return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="rgba(140,190,255,0.08)" strokeWidth="0.5"/>
          })}
        </svg>
      </div>
    );
  }
  if (kind === 'topography') {
    return (
      <div style={{position:'absolute', inset:0, background:'#060608'}}>
        <svg width="100%" height="100%" viewBox="0 0 414 868" preserveAspectRatio="xMidYMid slice" style={{position:'absolute',inset:0}}>
          <defs>
            <radialGradient id="tg" cx="50%" cy="60%" r="70%">
              <stop offset="0%" stopColor="#1a1418"/>
              <stop offset="100%" stopColor="#060608"/>
            </radialGradient>
          </defs>
          <rect width="414" height="868" fill="url(#tg)"/>
          {Array.from({length: 14}).map((_,i)=>(
            <ellipse key={i} cx="207" cy={480+i*8} rx={60+i*22} ry={20+i*6}
                     fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="0.8"/>
          ))}
        </svg>
      </div>
    );
  }
  return (
    <div style={{position:'absolute', inset:0,
      background: 'radial-gradient(100% 70% at 50% 30%, #18181e 0%, #0a0a0d 60%, #050507 100%)'
    }}/>
  );
}

function NotificationCard({ app, title, body, delay, tint }) {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(()=>setShow(true), delay); return ()=>clearTimeout(t); }, [delay]);
  return (
    <div style={{
      opacity: show ? 1 : 0,
      transform: show ? 'translateY(0)' : 'translateY(-18px)',
      transition: 'opacity 0.5s ease, transform 0.6s cubic-bezier(0.2,0.8,0.2,1)',
      background: 'rgba(20,20,26,0.55)',
      backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)',
      border: '1px solid rgba(255,255,255,0.08)',
      borderRadius: 18, padding: '12px 14px',
      marginBottom: 8,
      display:'flex', gap:12, alignItems:'flex-start'
    }}>
      <div style={{
        width: 34, height: 34, borderRadius: 9,
        background: tint, color:'#fff',
        display:'flex', alignItems:'center', justifyContent:'center',
        flexShrink: 0,
        fontSize: 11, fontWeight: 700, letterSpacing:'0.04em', fontFamily:'JetBrains Mono, monospace'
      }}>{app.slice(0,2).toUpperCase()}</div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:2}}>
          <span style={{fontSize:12, fontWeight:600, color:'var(--ink)'}}>{app}</span>
          <span className="mono" style={{fontSize:10, color:'var(--ink-faint)'}}>now</span>
        </div>
        <div style={{fontSize:13.5, fontWeight:500, color:'var(--ink)', marginBottom:2, lineHeight:1.25}}>{title}</div>
        <div style={{fontSize:12.5, color:'var(--ink-dim)', lineHeight:1.3}}>{body}</div>
      </div>
    </div>
  );
}

function LockScreen({ onUnlock, wallpaper }) {
  const [time, setTime] = React.useState('');
  const [date, setDate] = React.useState('');
  const [drag, setDrag] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const startY = React.useRef(0);

  React.useEffect(()=>{
    const update = () => {
      const d = new Date();
      let h = d.getHours(); const m = d.getMinutes();
      setTime(`${h}:${m.toString().padStart(2,'0')}`);
      const wd = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
      const mo = ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()];
      setDate(`${wd}, ${mo} ${d.getDate()}`);
    };
    update();
    const i = setInterval(update, 30000);
    return ()=> clearInterval(i);
  },[]);

  const onStart = (y) => { startY.current = y; setDragging(true); };
  const onMove = (y) => {
    if (!dragging) return;
    const dy = Math.min(0, y - startY.current);
    setDrag(dy);
    if (dy < -200) { setDragging(false); setDrag(-868); setTimeout(onUnlock, 360); }
  };
  const onEnd = () => {
    if (!dragging) return;
    if (drag < -120) { setDrag(-868); setTimeout(onUnlock, 360); }
    else { setDrag(0); }
    setDragging(false);
  };

  return (
    <div
      onMouseDown={(e)=>onStart(e.clientY)}
      onMouseMove={(e)=>onMove(e.clientY)}
      onMouseUp={onEnd} onMouseLeave={onEnd}
      onTouchStart={(e)=>onStart(e.touches[0].clientY)}
      onTouchMove={(e)=>onMove(e.touches[0].clientY)}
      onTouchEnd={onEnd}
      style={{
        position:'absolute', inset:0, overflow:'hidden',
        transform: `translateY(${drag}px)`,
        transition: dragging ? 'none' : 'transform 0.42s cubic-bezier(0.2,0.8,0.2,1)',
        cursor: 'grab'
      }}>
      <Wallpaper kind={wallpaper}/>
      <StatusBar time={time} />
      <div style={{position:'absolute', top:72, left:0, right:0, textAlign:'center', color:'var(--ink)'}}>
        <div className="mono" style={{fontSize:13, color:'var(--ink-dim)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6}}>{date}</div>
        <div style={{fontSize:86, fontWeight:300, lineHeight:1, letterSpacing:'-0.04em'}}>{time}</div>
      </div>
      <div style={{position:'absolute', top:260, left:0, right:0, textAlign:'center', padding:'0 24px'}}>
        <div style={{fontSize:28, fontWeight:500, letterSpacing:'-0.02em', color:'var(--ink)'}}>Syed Omer Shah</div>
        <div className="mono" style={{fontSize:11.5, color:'var(--ink-dim)', marginTop:6, letterSpacing:'0.06em'}}>
          AI/ML ENGINEER &middot; RESEARCHER &middot; BUILDER
        </div>
      </div>
      <div style={{position:'absolute', top:360, left:12, right:12}}>
        <NotificationCard app="arXiv" title="New paper published" body="MolFM-Lite -- 0.956 AUC. Multi-modal Transformer for molecules."
          delay={600} tint="linear-gradient(135deg,#b8312f,#8a1f1d)"/>
        <NotificationCard app="Intel" title="Internship offer accepted" body="Intel Corporation -- AI Software Engineer -- Summer 2026"
          delay={1200} tint="linear-gradient(135deg,#4a5568,#2d3748)"/>
        <NotificationCard app="AWS" title="Deliver Results Award" body="Recognized at re:Invent 2025"
          delay={1800} tint="linear-gradient(135deg,#d97706,#92400e)"/>
      </div>
      <div style={{
        position:'absolute', bottom: 38, left:0, right:0, textAlign:'center',
        color:'var(--ink-dim)', fontSize: 12.5,
        animation: 'bobUp 2.6s ease-in-out infinite'
      }}>
        <div style={{marginBottom:6, opacity: 0.6}}>
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" style={{margin:'0 auto', display:'block'}}>
            <path d="M4 9l8-6 8 6"/>
          </svg>
        </div>
        Swipe up to unlock
      </div>
      <HomeBar light onTap={()=>{ setDrag(-868); setTimeout(onUnlock, 360);} }/>

function Confetti() {
  const pieces = Array.from({length: 30});
  return (
    <>
      {pieces.map((_,i)=>{
        const left = (i*37)%100;
        const delay = (i%10)*0.08;
        const dur = 2 + (i%5)*0.3;
        const color = ['#4a7cff','#e8b54a','#f0658e','#6cc17a','#8b6bf0'][i%5];
        const rot = (i*37)%360;
        return <span key={i} style={{
          position:'absolute', top:-10, left:`${left}%`,
          width:6, height:10, background:color, borderRadius:1,
          transform:`rotate(${rot}deg)`,
          animation:`fall ${dur}s ${delay}s ease-in forwards`
        }}/>
      })}
      <style>{`
        @keyframes fall {
          0% { transform: translateY(0) rotate(0); opacity: 1; }
          100% { transform: translateY(260px) rotate(540deg); opacity: 0; }
        }
      `}</style>
    </>
  );
}

function HomeScreen({ onOpenApp, wallpaper, iconStyle }) {
  const [spotlightOpen, setSpotOpen] = React.useState(false);
  const [pullY, setPullY] = React.useState(0);
  const [dragging, setDrag] = React.useState(false);
  const startY = React.useRef(0);
  const [time, setTime] = React.useState('');
  React.useEffect(()=>{
    const u = ()=>{ const d=new Date(); setTime(`${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`);};
    u(); const i=setInterval(u,30000); return ()=>clearInterval(i);
  },[]);

  const onStart = (y) => { startY.current = y; setDrag(true); };
  const onMove = (y) => {
    if (!dragging) return;
    const dy = Math.max(0, y - startY.current);
    setPullY(Math.min(dy, 200));
    if (dy > 120) { setDrag(false); setPullY(0); setSpotOpen(true); }
  };
  const onEnd = () => { setDrag(false); setPullY(0); };

  return (
    <div style={{position:'absolute', inset:0, overflow:'hidden'}}
      onMouseDown={(e)=>{ if (e.clientY < 140) onStart(e.clientY); }}
      onMouseMove={(e)=>onMove(e.clientY)}
      onMouseUp={onEnd} onMouseLeave={onEnd}
      onTouchStart={(e)=>{ if (e.touches[0].clientY < 140) onStart(e.touches[0].clientY); }}
      onTouchMove={(e)=>onMove(e.touches[0].clientY)}
      onTouchEnd={onEnd}
    >
      <Wallpaper kind={wallpaper}/>
      <div style={{position:'absolute', inset:0, background:'rgba(0,0,0,0.25)'}}/>
      <StatusBar time={time}/>
      <div style={{position:'absolute', top:72, left:0, right:0, bottom:128, padding:'0 22px',
        transform: `translateY(${pullY*0.5}px)`, transition: dragging?'none':'transform 0.3s'}}>
        <div style={{
          display:'grid', gridTemplateColumns:'repeat(4, 1fr)', rowGap: 18, columnGap: 6,
          paddingTop: 12
        }}>
          {APPS.map(app => (
            <div key={app.id} style={{display:'flex', justifyContent:'center'}}>
              <AppIcon def={app} style={iconStyle} onOpen={()=>onOpenApp(app.id)}/>
            </div>
          ))}
        </div>
        <div onClick={()=>setSpotOpen(true)} style={{
          margin:'22px auto 0', width: 140,
          display:'flex', alignItems:'center', justifyContent:'center', gap:6,
          padding:'7px 14px', borderRadius: 999,
          background:'rgba(255,255,255,0.08)', color:'var(--ink-dim)',
          fontSize:12.5, cursor:'pointer', backdropFilter:'blur(10px)'
        }}>
          <G.search size={13} stroke={1.7}/> Search
        </div>
      </div>
      <div style={{display:'flex', gap:6, justifyContent:'center', marginBottom:10}}>
        <div style={{width:6, height:6, borderRadius:'50%', background:'#fff'}}/>
      </div>
      <div className="dock" style={{
        position:'absolute', left: 12, right: 12, bottom: 24,
        background:'rgba(22,22,28,0.5)',
        backdropFilter:'blur(24px)', WebkitBackdropFilter:'blur(24px)',
        border:'1px solid rgba(255,255,255,0.08)',
        borderRadius: 28, padding: '12px 10px',
        display:'flex', justifyContent:'space-around'
      }}>
        {DOCK.map(d => {
          const content = <AppIcon def={{...d, name:''}} style={iconStyle} small onOpen={()=>{

        <div style={{textAlign:'center', fontSize:11, color:'var(--ink-faint)', marginTop:10}}>
          Updated April 2026
        </div>
      </Scroller>
    </>
  );
}

// --- Router ---
function AppRouter({ id, onBack }) {
  const map = {
    about: AboutApp, edu: EduApp, skills: SkillsApp, exp: ExpApp,
    research: ResearchApp, projects: ProjectsApp, pubs: PubsApp, awards: AwardsApp,
    talks: TalksApp, lead: LeadApp, contact: ContactApp, resume: ResumeApp,
  };
  const C = map[id];
  if (!C) return null;
  return (
    <div style={{position:'absolute', inset:0, background:'#0a0a0e'}}>
      <C onBack={onBack}/>
    </div>
  );
}

// ============ ROOT APP ============
function applyAccent(which) {
  const map = {
    blue:   { accent: 'oklch(0.72 0.14 230)', ink: 'oklch(0.96 0.02 230)' },
    violet: { accent: 'oklch(0.72 0.14 290)', ink: 'oklch(0.96 0.02 290)' },
    amber:  { accent: 'oklch(0.78 0.14 75)',  ink: 'oklch(0.98 0.02 75)' },
    mint:   { accent: 'oklch(0.78 0.12 170)', ink: 'oklch(0.98 0.02 170)' },
  };
  const v = map[which] || map.mint;
  document.documentElement.style.setProperty('--accent', v.accent);
  document.documentElement.style.setProperty('--accent-ink', v.ink);
}

function TweaksPanel({ open, tweaks, update, onClose }) {
  return (
    <div className={`tweaks ${open?'open':''}`}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
        <h4>Tweaks</h4>
        <button onClick={onClose} style={{background:'none', border:'none', color:'var(--ink-dim)', cursor:'pointer', fontSize:16}}>&times;</button>
      </div>
      <div className="row">
        <label>Accent</label>
        <div className="pills">
          {[['blue','Signal'],['violet','Orbit'],['amber','Ember'],['mint','Mint']].map(([k,l])=>(
            <div key={k} className={`pill ${tweaks.accent===k?'active':''}`} onClick={()=>update({accent:k})}>{l}</div>
          ))}
        </div>
      </div>
      <div className="row">
        <label>Wallpaper</label>
        <div className="pills">
          {[['grid','Neural'],['topography','Topo'],['plain','Void']].map(([k,l])=>(
            <div key={k} className={`pill ${tweaks.wallpaper===k?'active':''}`} onClick={()=>update({wallpaper:k})}>{l}</div>
          ))}
        </div>
      </div>
      <div className="row">
        <label>Icon style</label>
        <div className="pills">
          {[['tinted','Tinted'],['glass','Glass'],['flat','Flat']].map(([k,l])=>(
            <div key={k} className={`pill ${tweaks.iconStyle===k?'active':''}`} onClick={()=>update({iconStyle:k})}>{l}</div>
          ))}
        </div>
      </div>
      <div style={{fontSize:10.5, color:'var(--ink-faint)', marginTop:10, lineHeight:1.5}}>
        Tip: try the search on the home screen -- type "hire me".
      </div>
    </div>
  );
}

function App() {
  const [stage, setStage] = React.useState('lock');
  const [app, setApp] = React.useState(null);
  const [scale, setScale] = React.useState(1);
  const [tweaks, setTweaks] = React.useState(window.TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  const update = (patch) => setTweaks(t => ({...t, ...patch}));

  React.useEffect(() => {
    try {
      const s = localStorage.getItem('os.stage');
      const a = localStorage.getItem('os.app');
      if (s) setStage(s);
      if (a && a !== 'null') setApp(a);
    } catch(e) {}
  }, []);

  React.useEffect(() => {
    try { localStorage.setItem('os.stage', stage); localStorage.setItem('os.app', app || 'null'); } catch(e){}
  }, [stage, app]);

  React.useEffect(() => { applyAccent(tweaks.accent); }, [tweaks.accent]);

  React.useEffect(() => {
    const onResize = () => {
      const w = window.innerWidth, h = window.innerHeight;
      const availW = Math.min(w - 40, 500);
      const availH = h - 40;
      const sW = availW / 414;
      const sH = availH / 868;
      setScale(Math.min(sW, sH, 1.05));
    };
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const openApp = (id) => { setApp(id); setStage('app'); };
  const backHome = () => { setStage('home'); setApp(null); };
  const reset = () => { setStage('lock'); setApp(null); };

  return (
    <div style={{
      position:'absolute', inset:0,
      display:'flex', alignItems:'center', justifyContent:'center'
    }}>
      <button onClick={reset} style={{
        position:'fixed', top: 14, right: 14, zIndex: 100,
        background:'rgba(20,20,26,0.6)', backdropFilter:'blur(12px)',
        border:'1px solid rgba(255,255,255,0.08)',
        color:'var(--ink-dim)', padding:'6px 11px', borderRadius: 999,
        fontSize: 11, fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.06em',
        cursor:'pointer'
      }}>LOCK</button>

      <button onClick={()=>setTweaksOpen(!tweaksOpen)} style={{
        position:'fixed', top: 14, right: 80, zIndex: 100,
        background:'rgba(20,20,26,0.6)', backdropFilter:'blur(12px)',
        border:'1px solid rgba(255,255,255,0.08)',
        color:'var(--ink-dim)', padding:'6px 11px', borderRadius: 999,
        fontSize: 11, fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.06em',
        cursor:'pointer'
      }}>TWEAKS</button>

      <Device scale={scale}>
        <SensorPill/>
        {stage === 'lock' && (
          <LockScreen onUnlock={()=>setStage('home')} wallpaper={tweaks.wallpaper}/>
        )}
        {stage !== 'lock' && (
          <HomeScreen onOpenApp={openApp} wallpaper={tweaks.wallpaper} iconStyle={tweaks.iconStyle}/>
        )}
        {stage === 'app' && (
          <div style={{
            position:'absolute', inset:0, animation: 'appOpen 0.35s cubic-bezier(0.2,0.8,0.2,1) both',
            zIndex: 40
          }}>
            <AppRouter id={app} onBack={backHome}/>
            <HomeBar light onTap={backHome}/>
          </div>
        )}
      </Device>

      <style>{`
        @keyframes appOpen {
          from { transform: scale(0.85); opacity: 0; }
          to { transform: scale(1); opacity: 1; }
        }
      `}</style>

      <TweaksPanel open={tweaksOpen} tweaks={tweaks} update={update} onClose={()=>setTweaksOpen(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
